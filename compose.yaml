services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      redis:
        condition: service_healthy
      peerjs-server:
        condition: service_healthy
    environment:
      - APP_PORT=${APP_PORT}
      - REDIS_ADDR=${REDIS_ADDR}
      - ENV=${ENV}
      - SESSION_SECRET=${SESSION_SECRET}
    restart: unless-stopped
    dns: 8.8.8.8

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  peerjs-server:
    image: peerjs/peerjs-server
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "12345:12345"
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /run/udev:/run/udev:ro
    environment:
      - INSTANCE_NAME=${INSTANCE_NAME}
      - REDIS_ADDR=${REDIS_ADDR}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: run --storage.path=/tmp/alloy --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_add:
      - SYS_PTRACE
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: chatopia-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"

  grafana:
    image: grafana/grafana:13.1.0
    container_name: chatopia-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning/datasources/ds.yaml:/etc/grafana/provisioning/datasources/ds.yaml:ro
      - ./infra/grafana/provisioning/dashboards/provider.yaml:/etc/grafana/provisioning/dashboards/provider.yaml:ro
      - ./infra/grafana/provisioning/dashboards/json:/etc/grafana/provisioning/dashboards/json:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
