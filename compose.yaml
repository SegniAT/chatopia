services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatopia-web
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      redis:
        condition: service_healthy
      peerjs-server:
        condition: service_healthy
    environment:
      - APP_PORT=${APP_PORT}
      - REDIS_ADDR=${REDIS_ADDR}
      - ENV=${ENV}
      - SESSION_SECRET=${SESSION_SECRET}
    restart: unless-stopped
    dns: 8.8.8.8

  redis:
    image: redis:7-alpine
    container_name: chatopia-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  peerjs-server:
    image: peerjs/peerjs-server
    container_name: chatopia-peerjs-server
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile_inline: |
        FROM caddy:2.9-builder AS builder
        RUN xcaddy build \
            --with github.com/mholt/caddy-ratelimit
        FROM caddy:2.9
        COPY --from=builder /usr/bin/caddy /usr/bin/caddy
    container_name: chatopia-caddy
    restart: unless-stopped
    ports:
      - "${CADDY_PORT:-80}:80"
      # - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      web:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  alloy:
    image: grafana/alloy:latest
    container_name: chatopia-alloy
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "127.0.0.1:12345:12345"
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /run/udev:/run/udev:ro
    environment:
      - INSTANCE_NAME=${INSTANCE_NAME}
      - REDIS_ADDR=${REDIS_ADDR}
    command: run --storage.path=/tmp/alloy --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_add:
      - SYS_PTRACE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: chatopia-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--web.enable-remote-write-receiver"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  grafana:
    image: grafana/grafana:13.1.0
    container_name: chatopia-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning/datasources/ds.yaml:/etc/grafana/provisioning/datasources/ds.yaml:ro
      - ./infra/grafana/provisioning/dashboards/provider.yaml:/etc/grafana/provisioning/dashboards/provider.yaml:ro
      - ./infra/grafana/provisioning/dashboards/json:/etc/grafana/provisioning/dashboards/json:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

  loki:
    image: grafana/loki:3.7.3
    container_name: chatopia-loki
    restart: unless-stopped
    user: root
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1024M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  caddy_data:
